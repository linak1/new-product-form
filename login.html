<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول - Supplier Form</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #ffffff;
      width: 420px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 18px;
      height: 50px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #ff7a00;
      border: none;
      color: white;
      font-size: 17px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #e66d00;
    }

    .error {
      display: none;
      color: #d90429;
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>تسجيل الدخول</h2>

    <form id="loginForm">
      <label>اسم المستخدم</label>
      <input type="text" id="username" required />

      <label>كلمة السر</label>
      <input type="password" id="password" required />

      <button type="submit">دخول</button>
    </form>

    <div id="error" class="error">اسم المستخدم أو كلمة السر غير صحيحة</div>
  </div>

  <script>
    const USERNAME = "Nizami";
    const PASSWORD = "Nizami@2026";

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (username === USERNAME && password === PASSWORD) {
        localStorage.setItem("supplierLoggedIn", "true");
        window.location.href = "index.html";
      } else {
        document.getElementById("error").style.display = "block";
      }
    });
  </script>
</body>
</html>
