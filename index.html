<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supplier New Product Form</title>

  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --success-bg: #dcfce7;
      --success-text: #166534;
      --preview-bg: #eff6ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 16px;
    }

    .top-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .order-badge {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 16px;
      font-weight: bold;
      direction: ltr;
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.08);
    }

    section {
      margin-bottom: 28px;
    }

    .section-box {
      background: #f3f4f6;
      padding: 18px;
      border-radius: 20px;
    }

    .attribute-box {
      border: 1px solid var(--border);
      padding: 18px;
      border-radius: 20px;
    }

    h2 {
      font-size: 18px;
      margin: 0 0 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .hidden {
      display: none !important;
    }

    label {
      font-size: 14px;
      font-weight: bold;
      color: #374151;
    }

    .required {
      color: var(--danger);
    }

    input,
    select {
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 12px;
      font-size: 15px;
      background: #fff;
      width: 100%;
    }

    input:focus,
    select:focus {
      outline: 2px solid #bfdbfe;
      border-color: var(--primary);
    }

    .order-input {
      display: flex;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .order-input span {
      display: flex;
      align-items: center;
      padding: 0 14px;
      font-weight: bold;
      background: #e5e7eb;
      direction: ltr;
    }

    .order-input input {
      border: 0;
      border-radius: 0;
      direction: ltr;
      text-align: left;
    }

    .preview {
      display: none;
      background: var(--preview-bg);
      border: 1px solid #bfdbfe;
      border-radius: 20px;
      padding: 18px;
    }

    .preview.visible {
      display: block;
    }

    .preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .final-name {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      font-size: 22px;
      font-weight: bold;
      direction: rtl;
      text-align: right;
      border: 1px solid #dbeafe;
      min-height: 58px;
    }

    .preview input {
      direction: rtl;
      text-align: right;
      font-size: 18px;
      font-weight: bold;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .summary-grid div {
      background: #fff;
      border-radius: 14px;
      padding: 11px;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-start;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .btn-success {
      background: #16a34a;
      color: white;
    }

    .message {
      display: none;
      margin-bottom: 18px;
      padding: 13px 16px;
      border-radius: 14px;
      background: var(--success-bg);
      color: var(--success-text);
      font-weight: bold;
    }

    .message.visible {
      display: block;
    }

    @media (max-width: 800px) {
      .grid,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 23px;
      }

      .card {
        padding: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="top-title">
      <div>
        <h1>Supplier New Product Form</h1>
      </div>

      <div class="order-badge">
        Order No: <span id="orderBadge">GS</span>
      </div>
    </div>

    <div class="card">
      <div id="message" class="message">
        تم حفظ / إرسال المنتج بنجاح
      </div>

      <form id="productForm">
        <section class="section-box">
          <h2>بيانات الفاتورة</h2>

          <div class="grid">
            <div class="field">
              <label>رقم الفاتورة <span class="required">*</span></label>
              <input id="invoiceNo" required />
            </div>

            <div class="field">
              <label>تاريخ الفاتورة <span class="required">*</span></label>
              <input id="invoiceDate" type="date" required />
            </div>

            <div class="field">
              <label>رقم الطلب <span class="required">*</span></label>

              <div class="order-input">
                <span>GS</span>
                <input id="orderNoSuffix" placeholder="اكتب الرقم فقط" required />
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>Product Details / تفاصيل المنتج</h2>

          <div class="grid">
            <div class="field">
              <label>رقم المنتج <span class="required">*</span></label>
              <input id="productNo" required />
            </div>

            <div class="field">
              <label>CATEGORY <span class="required">*</span></label>
              <select id="category" required>
                <option value="">Select category</option>
              </select>
            </div>

            <div class="field">
              <label>SUBCATEGORY <span class="required">*</span></label>
              <select id="subcategory" required>
                <option value="">Select category first</option>
              </select>
            </div>
          </div>
        </section>

        <section class="attribute-box">
          <h2>ATTRIBUTE / المواصفات</h2>

          <div class="grid">
            <div class="field attribute-field" data-attribute="material">
              <label>الخامة</label>
              <select id="material"></select>
            </div>

            <div class="field attribute-field" data-attribute="pieces">
              <label>عدد القطع</label>
              <select id="pieces"></select>
            </div>

            <div class="field attribute-field" data-attribute="type">
              <label>النوع</label>
              <select id="type"></select>
            </div>

            <div class="field attribute-field" data-attribute="color">
              <label>اللون</label>
              <select id="color"></select>
            </div>

            <div class="field attribute-field" data-attribute="brand">
              <label>البراند</label>
              <select id="brand"></select>
            </div>

            <div class="field attribute-field" data-attribute="size">
              <label>المقاس</label>
              <select id="size"></select>
            </div>

            <div class="field attribute-field" data-attribute="volume">
              <label>الحجم</label>
              <select id="volume"></select>
            </div>

            <div class="field attribute-field" data-attribute="stitches">
              <label>عدد الغرز</label>
              <select id="stitches"></select>
            </div>

            <div class="field attribute-field" data-attribute="height">
              <label>الارتفاع</label>
              <select id="height"></select>
            </div>

            <div class="field">
              <label>اسم المنتج <span class="required">*</span></label>
              <input id="productName" placeholder="مثال: ARCH" required />
            </div>
          </div>
        </section>

        <section id="previewBox" class="preview">
          <div class="preview-head">
            <h2>معاينة اسم المنتج النهائي</h2>
            <button id="editNameBtn" type="button" class="btn-secondary">تعديل</button>
          </div>

          <div id="finalNameText" class="final-name"></div>

          <input
            id="finalNameInput"
            style="display: none; margin-top: 8px;"
          />

          <div class="summary-grid">
            <div>Invoice: <b id="summaryInvoice"></b></div>
            <div>Date: <b id="summaryDate"></b></div>
            <div>Order: <b id="summaryOrder"></b></div>
          </div>
        </section>

        <div class="actions">
          <button type="button" id="resetBtn" class="btn-secondary">
            تفريغ الخانات
          </button>

          <button type="submit" class="btn-primary">
            Save Preview
          </button>

          <button type="button" id="sendBtn" class="btn-success" style="display: none;">
            إرسال
          </button>

          <button type="button" id="cancelPreviewBtn" class="btn-danger" style="display: none;">
            إلغاء المعاينة
          </button>
        </div>
      </form>
    </div>
  </div>

    const ATTRIBUTE_KEYS = [
      "material",
      "pieces",
      "type",
      "color",
      "brand",
      "size",
      "volume",
      "stitches",
      "height"
    ];

    const $ = (id) => document.getElementById(id);

    const fields = {
      invoiceNo: $("invoiceNo"),
      invoiceDate: $("invoiceDate"),
      orderNoSuffix: $("orderNoSuffix"),
      productNo: $("productNo"),
      category: $("category"),
      subcategory: $("subcategory"),
      material: $("material"),
      pieces: $("pieces"),
      type: $("type"),
      color: $("color"),
      brand: $("brand"),
      size: $("size"),
      volume: $("volume"),
      stitches: $("stitches"),
      height: $("height"),
      productName: $("productName")
    };

    const previewBox = $("previewBox");
    const sendBtn = $("sendBtn");
    const cancelPreviewBtn = $("cancelPreviewBtn");
    const finalNameText = $("finalNameText");
    const finalNameInput = $("finalNameInput");
    const editNameBtn = $("editNameBtn");
    const message = $("message");

    let isEditingName = false;

    function addOptions(select, items, placeholder = "") {
      select.innerHTML = "";

      if (placeholder) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = placeholder;
        select.appendChild(option);
      }

      items.forEach((item) => {
        const option = document.createElement("option");
        option.value = item;
        option.textContent = item;
        select.appendChild(option);
      });
    }

    function clean(value) {
      return String(value || "").trim();
    }

    function initDropdowns() {
      addOptions(fields.category, DATA.categories, "Select category");
      addOptions(fields.subcategory, [], "Select category first");

      ATTRIBUTE_KEYS.forEach((key) => {
        const wrapper = document.querySelector(`[data-attribute="${key}"]`);
        wrapper.classList.add("hidden");
        addOptions(fields[key], [], "Select");
      });
    }

    function getOrderNo() {
      return "GS-" + clean(fields.orderNoSuffix.value);
    }

    function updateOrderBadge() {
      $("orderBadge").textContent = getOrderNo();
    }

    function updateAttributesForCategory(category) {
      const attrs = DATA.attrsByCategory[category] || {};

      ATTRIBUTE_KEYS.forEach((key) => {
        const wrapper = document.querySelector(`[data-attribute="${key}"]`);
        const options = attrs[key] || [];

        if (options.length > 0) {
          wrapper.classList.remove("hidden");
          addOptions(fields[key], options, "Select");
        } else {
          wrapper.classList.add("hidden");
          addOptions(fields[key], [], "Select");
        }
      });
    }

    /*
      الصيغة النهائية المطلوبة:
      CATEGORY SUBCATEGORY| عدد القطع قطعة اسم المنتج

      مثال:
      طقم لحاف كينغ| 2 قطعة ARCH
    */
    function buildProductName() {
      const categoryNameForFinal =
        fields.category.value === "أطقم غطاء سرير"
        ? "طقم غطاء سرير"
        : fields.category.value;
      
      const categoryPart = [
        fields.category.value,
        fields.subcategory.value
      ].map(clean).filter(Boolean).join(" ");

      const piecesValue = clean(fields.pieces.value);
      const piecesText = piecesValue && piecesValue !== "NA"
        ? piecesValue + " قطعة"
        : "";

      const productPart = [
        piecesText,
        fields.productName.value
      ].map(clean).filter(Boolean).join(" ");

      return [categoryPart, productPart]
        .filter(Boolean)
        .join("| ");
    }

    function getFormData() {
      return {
        invoiceNo: clean(fields.invoiceNo.value),
        invoiceDate: clean(fields.invoiceDate.value),
        orderNo: getOrderNo(),
        productNo: clean(fields.productNo.value),
        category: clean(fields.category.value),
        subcategory: clean(fields.subcategory.value),
        material: clean(fields.material.value),
        pieces: clean(fields.pieces.value),
        type: clean(fields.type.value),
        color: clean(fields.color.value),
        brand: clean(fields.brand.value),
        size: clean(fields.size.value),
        volume: clean(fields.volume.value),
        stitches: clean(fields.stitches.value),
        height: clean(fields.height.value),
        productName: clean(fields.productName.value),
        finalProductName: clean(finalNameText.textContent || finalNameInput.value),
        createdAt: new Date().toISOString()
      };
    }

    function showPreview() {
      const finalName = buildProductName();

      finalNameText.textContent = finalName;
      finalNameInput.value = finalName;

      $("summaryInvoice").textContent = fields.invoiceNo.value;
      $("summaryDate").textContent = fields.invoiceDate.value;
      $("summaryOrder").textContent = getOrderNo();

      previewBox.classList.add("visible");
      sendBtn.style.display = "inline-block";
      cancelPreviewBtn.style.display = "inline-block";
      message.classList.remove("visible");
    }

    async function sendData() {
      const formData = getFormData();

      if (!formData.finalProductName) {
        alert("أولاً تأكد من اسم المنتج النهائي أو اعمل Preview");
        return;
      }

      /*
        حفظ محلي احتياطي داخل المتصفح.
        هذا لا يغني عن Google Sheets، لكنه يفيد للتجربة.
      */
      const oldData = JSON.parse(localStorage.getItem("supplierProducts") || "[]");
      localStorage.setItem("supplierProducts", JSON.stringify([formData, ...oldData]));

      /*
        إرسال إلى Google Sheets إذا تم وضع رابط GOOGLE_SCRIPT_URL.
      */
      if (GOOGLE_SCRIPT_URL) {
        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(formData)
          });
        } catch (error) {
          console.error(error);
          alert("صار خطأ أثناء الإرسال إلى Google Sheets، لكن تم حفظ نسخة محلية بالمتصفح.");
          return;
        }
      }

      message.classList.add("visible");

      $("productForm").reset();
      fields.invoiceDate.value = new Date().toISOString().slice(0, 10);

      updateOrderBadge();

      previewBox.classList.remove("visible");
      sendBtn.style.display = "none";
      cancelPreviewBtn.style.display = "none";

      isEditingName = false;
      finalNameInput.style.display = "none";
      finalNameText.style.display = "block";
      editNameBtn.textContent = "تعديل";

      addOptions(fields.subcategory, [], "Select category first");
      updateAttributesForCategory("");
    }

    fields.category.addEventListener("change", () => {
      const selectedCategory = fields.category.value;

      const subcategories = DATA.subByCategory[selectedCategory] || ["NA"];
      addOptions(fields.subcategory, subcategories, "Select subcategory");

      updateAttributesForCategory(selectedCategory);
    });

    fields.orderNoSuffix.addEventListener("input", () => {
      fields.orderNoSuffix.value = fields.orderNoSuffix.value.replace(/[^0-9]/g, "");
      updateOrderBadge();
    });

    $("productForm").addEventListener("submit", (event) => {
      event.preventDefault();
      showPreview();
    });

    editNameBtn.addEventListener("click", () => {
      isEditingName = !isEditingName;

      if (isEditingName) {
        finalNameInput.value = finalNameText.textContent;
        finalNameText.style.display = "none";
        finalNameInput.style.display = "block";
        editNameBtn.textContent = "تم التعديل";
      } else {
        finalNameText.textContent = finalNameInput.value;
        finalNameInput.style.display = "none";
        finalNameText.style.display = "block";
        editNameBtn.textContent = "تعديل";
      }
    });

    sendBtn.addEventListener("click", sendData);

    cancelPreviewBtn.addEventListener("click", () => {
      previewBox.classList.remove("visible");
      sendBtn.style.display = "none";
      cancelPreviewBtn.style.display = "none";
    });

    $("resetBtn").addEventListener("click", () => {
      $("productForm").reset();
      fields.invoiceDate.value = new Date().toISOString().slice(0, 10);

      updateOrderBadge();

      previewBox.classList.remove("visible");
      sendBtn.style.display = "none";
      cancelPreviewBtn.style.display = "none";
      message.classList.remove("visible");

      addOptions(fields.subcategory, [], "Select category first");
      updateAttributesForCategory("");
    });

    initDropdowns();
    fields.invoiceDate.value = new Date().toISOString().slice(0, 10);
    updateOrderBadge();
  </script>
